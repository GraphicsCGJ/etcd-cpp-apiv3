# =============================================================================
# debian.cfg — Project-specific configuration for debian.sh
# Sensitive values (tokens, URLs) can be kept here and .gitignore'd,
# or overridden via environment variables or CLI flags at runtime.
# =============================================================================

# -----------------------------------------------------------------------------
# REQUIRED: Package identity
# -----------------------------------------------------------------------------
PKG_NAME="etcd-cpp-apiv3"                       # Debian source package name
DEB_PKG_NAMES=("libetcd-cpp-apiv3-dev")         # Binary package name(s)

# -----------------------------------------------------------------------------
# OPTIONAL: pbuilder base tarball
# If set, uses ${DISTRO}-${SUFFIX}.tgz as the chroot base instead of the
# default. Created automatically on first run. Use `base-reset` to rebuild.
# -----------------------------------------------------------------------------
# CUSTOM_BASETGZ_SUFFIX="etcd"
# CUSTOM_BASE_SETUP="apt-get install -y --no-install-recommends protobuf-compiler"

# -----------------------------------------------------------------------------
# OPTIONAL: Extra bind mounts into the pbuilder chroot
# -----------------------------------------------------------------------------
# EXTRA_BINDMOUNTS="/some/host/path"

# -----------------------------------------------------------------------------
# OPTIONAL: Extra directories to remove on `clean`
# -----------------------------------------------------------------------------
# CLEAN_EXTRA_DIRS=("obj-foo/")

# -----------------------------------------------------------------------------
# OPTIONAL: Maintainer identity
# Priority: CLI flag (--name/--email) > env var > values below > script default
# -----------------------------------------------------------------------------
# DEBFULLNAME="Your Name"
# DEBEMAIL="you@example.com"

# -----------------------------------------------------------------------------
# OPTIONAL: JFrog Artifactory  (for `package --jfrog`)
# Priority: env var > CLI flag (--jfrog-token/--jfrog-url) > values below
# JFROG_TOKEN  — Identity Token (Reference Token) issued by JFrog
# JFROG_URL    — Full Artifactory repository URL
#                e.g. https://myorg.jfrog.io/artifactory/my-debian-repo
# -----------------------------------------------------------------------------
# JFROG_TOKEN="${JFROG_TOKEN:-your-jfrog-token}"
# JFROG_URL="${JFROG_URL:-https://myorg.jfrog.io/artifactory/my-debian-repo}"

# -----------------------------------------------------------------------------
# OPTIONAL: Aptly  (for `package --aptly` and `aptly` commands)
# Priority: env var > CLI flag (--aptly-token/--aptly-url/--aptly-repo) > values below
# APTLY_TOKEN  — Bearer token for Aptly REST API
# APTLY_URL    — Aptly API base URL  (e.g. http://10.0.0.1:8080)
# APTLY_REPO   — Aptly local repository name; distro-specific
#                e.g. packages-noble / packages-jammy
# -----------------------------------------------------------------------------
# APTLY_TOKEN="${APTLY_TOKEN:-your-aptly-token}"
# APTLY_URL="${APTLY_URL:-http://10.16.0.99:8080}"
# APTLY_REPO="${APTLY_REPO:-packages-noble}"
